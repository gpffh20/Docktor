name: "🐛 Bug"
description: "Bug 발생 시 작성해주세요."
title: "(대문자로 시작하기)"
labels: ["fix"]
body:
  - type: textarea
    id: Problem
    attributes:
      label: 🚨 Problem
      description: 무슨 문제가 발생했는지 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: Reproduction
    attributes:
      label: 🌀 Reproduction
      description: 버그 재현 방법을 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: Screenshot
    attributes:
      label: 📸 Screenshot
      description: 이해를 돕기 위해 잘못된 결과에 대한 스크린샷을 첨부해주세요.
  - type: textarea
    id: Expected-Behavior
    attributes:
      label: 👍🏻 Expected Behavior
      description: 버그가 없었을 때 어떤 결과가 나왔어야 하는지 설명해주세요.
  - type: textarea
    id: Log
    attributes:
      label: ⚠️ Log
      description: 에러 로그를 복사해서 첨부해주세요.
      render: Shell